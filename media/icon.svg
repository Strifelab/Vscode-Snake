<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Background - Nokia 3310 light green -->
  <rect width="128" height="128" rx="12" fill="#9bbc0f"/>

  <!-- Inner screen - slightly darker green -->
  <rect x="8" y="8" width="112" height="112" rx="4" fill="#8bac0f" stroke="#306230" stroke-width="2"/>

  <!-- Grid lines (subtle) -->
  <g stroke="#306230" stroke-width="0.3" opacity="0.4">
    <line x1="8" y1="22" x2="120" y2="22"/>
    <line x1="8" y1="36" x2="120" y2="36"/>
    <line x1="8" y1="50" x2="120" y2="50"/>
    <line x1="8" y1="64" x2="120" y2="64"/>
    <line x1="8" y1="78" x2="120" y2="78"/>
    <line x1="8" y1="92" x2="120" y2="92"/>
    <line x1="8" y1="106" x2="120" y2="106"/>
    <line x1="22" y1="8" x2="22" y2="120"/>
    <line x1="36" y1="8" x2="36" y2="120"/>
    <line x1="50" y1="8" x2="50" y2="120"/>
    <line x1="64" y1="8" x2="64" y2="120"/>
    <line x1="78" y1="8" x2="78" y2="120"/>
    <line x1="92" y1="8" x2="92" y2="120"/>
    <line x1="106" y1="8" x2="106" y2="120"/>
  </g>

  <!-- Snake body - pixelated segments in dark green -->
  <!-- Segment 1 (tail) -->
  <rect x="24" y="66" width="12" height="12" rx="1" fill="#0f380f"/>
  <!-- Segment 2 -->
  <rect x="24" y="52" width="12" height="12" rx="1" fill="#0f380f"/>
  <!-- Segment 3 -->
  <rect x="38" y="52" width="12" height="12" rx="1" fill="#0f380f"/>
  <!-- Segment 4 -->
  <rect x="52" y="52" width="12" height="12" rx="1" fill="#0f380f"/>
  <!-- Segment 5 -->
  <rect x="52" y="66" width="12" height="12" rx="1" fill="#0f380f"/>
  <!-- Segment 6 -->
  <rect x="52" y="80" width="12" height="12" rx="1" fill="#0f380f"/>
  <!-- Segment 7 -->
  <rect x="66" y="80" width="12" height="12" rx="1" fill="#0f380f"/>
  <!-- Segment 8 -->
  <rect x="80" y="80" width="12" height="12" rx="1" fill="#0f380f"/>
  <!-- Segment 9 -->
  <rect x="80" y="66" width="12" height="12" rx="1" fill="#0f380f"/>
  <!-- Segment 10 -->
  <rect x="80" y="52" width="12" height="12" rx="1" fill="#0f380f"/>
  <!-- Segment 11 -->
  <rect x="80" y="38" width="12" height="12" rx="1" fill="#0f380f"/>
  <!-- Head - slightly larger -->
  <rect x="79" y="23" width="14" height="14" rx="1" fill="#0f380f"/>

  <!-- Eyes on head (facing up) -->
  <rect x="81" y="26" width="3" height="3" fill="#8bac0f"/>
  <rect x="88" y="26" width="3" height="3" fill="#8bac0f"/>

  <!-- Food - small square in medium green -->
  <rect x="40" y="82" width="8" height="8" fill="#306230"/>

  <!-- Special food - diamond shape (blinking effect represented as solid) -->
  <polygon points="30,36 36,30 42,36 36,42" fill="#0f380f"/>
</svg>
